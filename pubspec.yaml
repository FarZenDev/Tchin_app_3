name: tchin_app_3
description: "Tchin — jeu festif, version premium redessinée"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Fonts
  google_fonts: ^6.1.0

  # Monetization
  in_app_purchase: ^3.1.13
  google_mobile_ads: ^5.0.0
  shared_preferences: ^2.2.2
  auto_size_text: ^3.0.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# ──────────────────────────────────────────────
# flutter_launcher_icons configuration
# ──────────────────────────────────────────────
flutter_launcher_icons:
  image_path: "assets/app_icon.png"

  # Android
  android: true
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

  # iOS
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#1a1a2e"

  # Windows
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/devil_laugh_frames/
    - assets/devil_call/hell_bar_background_clean.png
    - assets/devil_call/hell_bar_atmosphere_overlay.png
    - assets/devil_call/hell_bar_flame_edges.png
